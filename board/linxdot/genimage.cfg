image boot.vfat {
    vfat {
        files = {
            "Image",
            "rk3566-linxdot.dtb",
            "boot.scr"
        }
    }
    size = 30M
}

image data.ext4 {
    empty = true
    ext4 {
        label = "data"
        use-mke2fs = true
    }
    size = 512M
}

image linxdot-basics-station.img {
    hdimage {
        partition-table-type = "gpt"
    }

    # Unified Rockchip bootloader blob: SPL/idbloader + FIT (TF-A BL31 + U-Boot),
    # pre-laid-out at the correct internal offsets. Written at absolute offset 32K,
    # the SPL lands at 32K and the FIT lands at ~8M — same absolute layout as the
    # previous two-partition scheme.
    partition uboot {
        image = "u-boot-rockchip.bin"
        offset = 32K
        in-partition-table = false
    }

    partition uboot_env {
        image = "uboot-env.bin"
        offset = 14M
        size = 128K
        in-partition-table = false
    }

    partition boot_a {
        image = "boot.vfat"
        offset = 16M
        bootable = true
    }

    partition rootfs_a {
        image = "rootfs.ext4"
    }

    partition boot_b {
        image = "boot.vfat"
    }

    partition rootfs_b {
        image = "rootfs.ext4"
    }

    partition data {
        image = "data.ext4"
    }
}
