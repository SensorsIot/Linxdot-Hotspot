image boot.vfat {
    vfat {
        files = {
            "Image",
            "rk3566-linxdot.dtb",
            "boot.scr"
        }
    }
    size = 30M
}

image data.ext4 {
    empty = true
    ext4 {
        label = "data"
        use-mke2fs = true
    }
    size = 512M
}

image linxdot-basics-station.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition idbloader {
        image = "idbloader.img"
        offset = 32K
        in-partition-table = false
    }

    partition uboot {
        image = "u-boot.itb"
        offset = 8M
        in-partition-table = false
    }

    partition uboot_env {
        image = "uboot-env.bin"
        offset = 14M
        size = 128K
        in-partition-table = false
    }

    partition boot_a {
        image = "boot.vfat"
        offset = 16M
        bootable = true
    }

    partition rootfs_a {
        image = "rootfs.ext4"
    }

    partition boot_b {
        image = "boot.vfat"
    }

    partition rootfs_b {
        image = "rootfs.ext4"
    }

    partition data {
        image = "data.ext4"
    }
}
