name: Build OpenLinxdot

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDROOT_VERSION: "2024.02.8"
  BUILDROOT_SHA256: "cbccfdf8483304b558f71de856867bf16e0ac542302423f6ae2217f751edee18"

permissions:
  contents: write

jobs:
  # ── Fast validation (~30s) — runs on every push and PR ──
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          echo "Checking shell scripts for syntax errors..."
          errors=0
          for f in board/linxdot/overlay/etc/init.d/S* \
                   board/linxdot/overlay/usr/sbin/ota-check \
                   scripts/gen-signing-key.sh \
                   tests/*.sh; do
            [ -f "$f" ] || continue
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            else
              echo "  OK: $f"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: $errors script(s) have syntax errors"
            exit 1
          fi

      - name: Check defconfig exists
        run: |
          if [ ! -f configs/linxdot_ld1001_defconfig ]; then
            echo "ERROR: defconfig not found"
            exit 1
          fi
          echo "defconfig OK ($(wc -l < configs/linxdot_ld1001_defconfig) lines)"

      - name: Check overlay structure
        run: |
          for f in board/linxdot/overlay/etc/init.d/S00datapart \
                   board/linxdot/overlay/etc/init.d/S40network \
                   board/linxdot/overlay/etc/init.d/S50sshd \
                   board/linxdot/overlay/etc/init.d/S60dockerd \
                   board/linxdot/overlay/etc/init.d/S80dockercompose \
                   board/linxdot/overlay/etc/fw_env.config \
                   board/linxdot/genimage.cfg \
                   board/linxdot/post-build.sh \
                   board/linxdot/post-image.sh \
                   board/linxdot/boot.cmd \
                   board/linxdot/uboot/linxdot.fragment \
                   board/linxdot/uboot/env.txt; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing $f"
              exit 1
            fi
          done
          echo "Overlay structure OK"

      - name: Run OTA static tests
        run: |
          sh tests/test_consistency.sh
          sh tests/test_ota_state_machine.sh

  # ── Detect if base-affecting files changed ──
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      base_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compare base hash
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Hash all files that affect the base rootfs — anything Buildroot consumes
          # during build. A file missing here means a silent cache hit on stale
          # artifacts (we once shipped an old U-Boot for hours because the fragment
          # wasn't in this list — session 5).
          CURRENT_HASH=$(cat \
            configs/linxdot_ld1001_defconfig \
            external.mk \
            Config.in \
            external.desc \
            package/docker-compose-v1/Config.in \
            package/docker-compose-v1/docker-compose-v1.mk \
            board/linxdot/uboot/linxdot.fragment \
            board/linxdot/uboot/env.txt \
            board/linxdot/post-build.sh \
            board/linxdot/swupdate/swupdate.config \
            2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "Current base hash: $CURRENT_HASH"

          # Get stored hash from latest base release
          STORED_HASH=$(gh release view base-latest --json body -q '.body' 2>/dev/null \
            | grep '^BASE_HASH=' | cut -d= -f2 || echo "none")
          echo "Stored base hash: $STORED_HASH"

          if [ "$CURRENT_HASH" != "$STORED_HASH" ]; then
            echo "Base files changed — rebuild needed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Base files unchanged — skipping rebuild"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Full Buildroot build (~1h) — only when base files change ──
  base-build:
    needs: [validate, detect-changes]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.base_changed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc g++ make patch \
            cpio unzip rsync bc wget file \
            libncurses-dev python3 perl \
            xz-utils git \
            bison flex gawk gettext texinfo \
            device-tree-compiler dosfstools mtools \
            libssl-dev \
            u-boot-tools

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: buildroot/dl
          key: buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/linxdot_ld1001_defconfig') }}
          restore-keys: |
            buildroot-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: ccache-${{ env.BUILDROOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ env.BUILDROOT_VERSION }}-

      - name: Download and extract Buildroot
        run: |
          if [ ! -f buildroot/Makefile ]; then
            wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz"
            echo "${BUILDROOT_SHA256}  buildroot-${BUILDROOT_VERSION}.tar.xz" | sha256sum -c -
            tar xf "buildroot-${BUILDROOT_VERSION}.tar.xz"
            rsync -a "buildroot-${BUILDROOT_VERSION}/" buildroot/
            rm -rf "buildroot-${BUILDROOT_VERSION}"
          fi

      - name: Configure and build base rootfs
        run: |
          cd buildroot
          make BR2_EXTERNAL="$(pwd)/.." linxdot_ld1001_defconfig

          # Enable tar output, disable overlay and scripts (applied in release job)
          # Buildroot writes .config in the source tree when no O= is given
          CONFIG=.config
          sed -i '/^BR2_TARGET_ROOTFS_TAR/d' "$CONFIG"
          sed -i '/^# BR2_TARGET_ROOTFS_TAR is not set/d' "$CONFIG"
          sed -i '/^BR2_ROOTFS_OVERLAY=/d' "$CONFIG"
          sed -i '/^BR2_ROOTFS_POST_BUILD_SCRIPT=/d' "$CONFIG"
          sed -i '/^BR2_ROOTFS_POST_IMAGE_SCRIPT=/d' "$CONFIG"
          sed -i '/^BR2_ROOTFS_POST_SCRIPT_ARGS=/d' "$CONFIG"
          printf 'BR2_TARGET_ROOTFS_TAR=y\nBR2_TARGET_ROOTFS_TAR_NONE=y\nBR2_ROOTFS_OVERLAY=""\nBR2_ROOTFS_POST_BUILD_SCRIPT=""\nBR2_ROOTFS_POST_IMAGE_SCRIPT=""\nBR2_ROOTFS_POST_SCRIPT_ARGS=""\n' >> "$CONFIG"
          make olddefconfig

          # Verify the config took effect
          echo "=== Rootfs format settings ==="
          grep -E '^BR2_TARGET_ROOTFS_(TAR|EXT)' "$CONFIG" || true
          grep -E '^BR2_ROOTFS_(OVERLAY|POST)' "$CONFIG" || true

          mkdir -p ~/.buildroot-ccache
          make -j$(nproc)

      - name: Compress base rootfs
        run: |
          ls -lh buildroot/output/images/rootfs.tar
          xz -3 -T0 buildroot/output/images/rootfs.tar
          ls -lh buildroot/output/images/rootfs.tar.xz

      - name: Bundle host tools
        run: |
          mkdir -p host-tools/bin host-tools/lib
          cp buildroot/output/host/bin/genimage host-tools/bin/
          for lib in $(ldd buildroot/output/host/bin/genimage | grep -oP '/\S+'); do
            cp "$lib" host-tools/lib/ 2>/dev/null || true
          done
          tar czf host-tools.tar.gz -C host-tools .

      - name: Compute base hash
        id: hash
        # Must match the detect-changes hash list exactly — if the two diverge,
        # the stored hash will never equal what detect-changes computes and we
        # rebuild every run (or worse, cache-hit stale artifacts).
        run: |
          CURRENT_HASH=$(cat \
            configs/linxdot_ld1001_defconfig \
            external.mk \
            Config.in \
            external.desc \
            package/docker-compose-v1/Config.in \
            package/docker-compose-v1/docker-compose-v1.mk \
            board/linxdot/uboot/linxdot.fragment \
            board/linxdot/uboot/env.txt \
            board/linxdot/post-build.sh \
            board/linxdot/swupdate/swupdate.config \
            2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "hash=$CURRENT_HASH" >> "$GITHUB_OUTPUT"

      - name: Upload base release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete base-latest --yes 2>/dev/null || true
          git push origin :refs/tags/base-latest 2>/dev/null || true

          gh release create base-latest \
            --title "Base rootfs ($(date -u +%Y-%m-%d))" \
            --notes "BASE_HASH=${{ steps.hash.outputs.hash }}" \
            --prerelease \
            buildroot/output/images/rootfs.tar.xz \
            buildroot/output/images/u-boot-rockchip.bin \
            host-tools.tar.gz

  # ── Fast image assembly (~2-3 min) — on tags, manual dispatch, or after base-build ──
  release:
    needs: [validate, detect-changes, base-build]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.base-build.result == 'success' || needs.base-build.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download base rootfs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading base rootfs from base-latest release..."
          gh release download base-latest \
            -p 'rootfs.tar.xz' -p 'host-tools.tar.gz' -p 'u-boot-rockchip.bin' \
            -D /tmp/base/ \
            || { echo "ERROR: No base release found. Push a change to defconfig or package/ to trigger a base build."; exit 1; }
          ls -lh /tmp/base/

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools mtools u-boot-tools e2fsprogs

          mkdir -p /tmp/host-tools
          tar xzf /tmp/base/host-tools.tar.gz -C /tmp/host-tools
          sudo cp /tmp/host-tools/bin/genimage /usr/local/bin/
          sudo cp /tmp/host-tools/lib/* /usr/local/lib/ 2>/dev/null || true
          sudo ldconfig

      - name: Assemble image
        env:
          OS_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p work/target work/images work/build

          echo ">>> Extracting base rootfs..."
          tar xf /tmp/base/rootfs.tar.xz -C work/target/

          echo ">>> Staging bootloader blob for genimage..."
          cp /tmp/base/u-boot-rockchip.bin work/images/

          echo ">>> Applying overlay..."
          rsync -a board/linxdot/overlay/ work/target/

          echo ">>> Running post-build.sh..."
          chmod +x board/linxdot/post-build.sh
          OS_VERSION="${OS_VERSION#v}" ./board/linxdot/post-build.sh work/target "$(pwd)"

          echo ">>> Creating rootfs.ext4..."
          SIZE_KB=$(du -sk work/target/ | cut -f1)
          SIZE_MB=$(( (SIZE_KB / 1024) + 50 ))
          [ "$SIZE_MB" -lt 500 ] && SIZE_MB=500
          sudo mke2fs -d work/target -t ext4 -r 1 -N 0 -m 0 -L rootfs \
            work/images/rootfs.ext4 "${SIZE_MB}M"

          echo ">>> Running post-image.sh..."
          chmod +x board/linxdot/post-image.sh
          ./board/linxdot/post-image.sh work/images "$(pwd)"

      - name: Validate image
        run: |
          IMG="work/images/linxdot-basics-station.img"

          if [ ! -f "$IMG" ]; then
            echo "ERROR: Image file not found"
            exit 1
          fi

          SIZE=$(stat -c%s "$IMG")
          if [ "$SIZE" -lt 100000000 ]; then
            echo "ERROR: Image too small ($SIZE bytes), expected > 100MB"
            exit 1
          fi
          echo "Image size: $(numfmt --to=iec $SIZE)"

          echo "Partition table:"
          fdisk -l "$IMG"

          PARTITIONS=$(fdisk -l "$IMG" 2>/dev/null | grep -c "^$IMG")
          if [ "$PARTITIONS" -lt 3 ]; then
            echo "ERROR: Expected at least 3 partitions, found $PARTITIONS"
            exit 1
          fi
          echo "Partition count: $PARTITIONS"

      - name: Run post-build image tests
        run: |
          IMAGE="work/images/linxdot-basics-station.img" \
            sh tests/test_image_layout.sh

      - name: Compress image
        run: |
          cd work/images
          xz -9 -T0 -k linxdot-basics-station.img

      - name: Build OTA update bundle (.swu)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd work/images

          SHA_ROOTFS=$(sha256sum rootfs.ext4 | cut -d' ' -f1)
          SHA_BOOT=$(sha256sum boot.vfat | cut -d' ' -f1)

          sed -e "s|@VERSION@|$VERSION|g" \
              -e "s|@SHA_ROOTFS@|$SHA_ROOTFS|g" \
              -e "s|@SHA_BOOT@|$SHA_BOOT|g" \
              "../../board/linxdot/swupdate/sw-description.tmpl" > sw-description

          FILES="sw-description"
          if [ -n "$OTA_SIGNING_KEY" ]; then
            printf '%s' "$OTA_SIGNING_KEY" > /tmp/signing.key
            chmod 600 /tmp/signing.key
            openssl dgst -sha256 -sign /tmp/signing.key \
                -out sw-description.sig sw-description
            shred -u /tmp/signing.key
            FILES="$FILES"$'\n'"sw-description.sig"
            echo ">>> SWU signed with OTA_SIGNING_KEY"
          else
            echo ">>> WARNING: OTA_SIGNING_KEY secret not set — .swu will be UNSIGNED"
          fi

          FILES="$FILES"$'\n'"rootfs.ext4"$'\n'"boot.vfat"

          SWU="linxdot-basics-station-${VERSION}.swu"
          echo "$FILES" | cpio -ov -H newc > "$SWU"
          ls -lh "$SWU"

      - name: Generate manifest.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd work/images
          SWU="linxdot-basics-station-${VERSION}.swu"
          SHA=$(sha256sum "$SWU" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$SWU")
          cat > manifest.json <<EOF
          {
            "version": "$VERSION",
            "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$SWU",
            "size": $SIZE,
            "sha256": "$SHA"
          }
          EOF
          cat manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linxdot-emmc-image
          path: work/images/linxdot-basics-station.img.xz
          retention-days: 30

      - name: Create release
        if: |
          startsWith(github.ref, 'refs/tags/v') &&
          github.repository == 'SensorsIot/Linxdot-Hotspot'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            work/images/linxdot-basics-station.img.xz
            work/images/linxdot-basics-station-*.swu
            work/images/manifest.json
          generate_release_notes: true
